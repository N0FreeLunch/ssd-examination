name: Deploy to AWS Lightsail (Hybrid CI/CD)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

# TODO: Production deployment (main branch)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_PAGER: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ap-northeast-2

      - name: Install AWS CLI (for local act)
        if: ${{ env.ACT }}
        run: |
          apt-get update && apt-get install -y curl unzip sudo jq
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
          else
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          fi
          unzip -q awscliv2.zip
          sudo ./aws/install
          aws --version

      - name: Fetch Environment Variables from S3 (Metadata Registry)
        run: |
          echo "☁️ Fetching deployment metadata from S3..."
          # Fetch metadata bucket from SSM (as a transition) or use a secret/hardcoded value
          # In the new strategy, we should use secrets.S3_METADATA_BUCKET
          META_BUCKET="sdd-exam-deploy-artifacts-dev-992481306230"
          
          aws s3 cp s3://${META_BUCKET}/deploy-config.json deploy-config.json
          
          echo "⚙️ Exporting metadata to GITHUB_ENV..."
          S3_BUCKET=$(jq -r .S3DeployBucket deploy-config.json)
          STATIC_IP=$(jq -r .LightsailStaticIP deploy-config.json)
          APP_NAME=$(jq -r .CodeDeployApplication deploy-config.json)
          DG_NAME=$(jq -r .CodeDeployDeploymentGroup deploy-config.json)
          
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          echo "DEPLOY_HOST=$STATIC_IP" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "DG_NAME=$DG_NAME" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Go Application
        run: |
          echo "🔨 Compiling Go application (Linux amd64)..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o server ./cmd/server

      # (TBD) Frontend Build (Vite/TS) - 현재 No-Build JS 문서에서 Build JS 도입 후 활성화
      # - name: Setup Node
      # - name: Build Frontend
      #   run: |
      #     npm ci
      #     npm run build

      - name: Package Artifact
        run: |
          echo "📦 Packaging artifacts for CodeDeploy..."
          zip -r deploy-artifact.zip server appspec.yml scripts/ docker-compose.*.yml tools/ infra/ || echo "Optional folders skipped"

      - name: Upload Artifact to S3
        run: |
          echo "☁️ Uploading artifact to S3 bucket..."
          aws s3 cp deploy-artifact.zip s3://${{ env.S3_BUCKET }}/deploy-artifact.zip --region ap-northeast-2

      - name: Trigger AWS CodeDeploy
        run: |
          echo "🚀 Triggering AWS CodeDeploy deployment..."
          aws deploy create-deployment \
            --application-name ${{ env.APP_NAME }} \
            --deployment-group-name ${{ env.DG_NAME }} \
            --s3-location bucket=${{ env.S3_BUCKET }},key=deploy-artifact.zip,bundleType=zip \
            --region ap-northeast-2
